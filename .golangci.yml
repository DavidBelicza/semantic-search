# golangci-lint configuration (v2 schema).
# Primary intent: keep functions flat.
# See CLAUDE.md → "Code style: prefer a flat structure".

version: "2"

linters:
  # Default "standard" set (govet, staticcheck, unused, ineffassign) stays on for
  # bug-catching, plus the nesting/complexity linters below.
  enable:
    - nestif   # flags nested if-blocks — enforces "no if inside if"
    - gocognit # cognitive complexity; nesting (incl. loops) compounds the score
    - gocyclo  # cyclomatic complexity
  disable:
    # Deliberately off: its findings are almost entirely deferred Close/Rollback and
    # fmt.Fprint* to stdout, where the error is not actionable. Handling them would add
    # noise, not safety.
    - errcheck
  settings:
    nestif:
      # Calibrated: a bare `if` inside an `if` scores complexity 1, while an `if`
      # inside a loop and sequential guard clauses score 0. So 1 enforces the
      # strict "no if inside if" rule without flagging if-in-loop.
      min-complexity: 1
    gocognit:
      min-complexity: 20
    gocyclo:
      min-complexity: 15
  exclusions:
    rules:
      # Test functions accumulate cyclomatic/cognitive complexity from long runs of
      # sequential assertions, which the complexity metrics are not meant to police.
      # The flatness rule (nestif) still applies to tests.
      - path: _test\.go
        linters:
          - gocyclo
          - gocognit
