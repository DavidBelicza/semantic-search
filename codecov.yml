coverage:
  status:
    project:
      default:
        # Don't fail the build on small coverage drops; report only.
        informational: true
    patch:
      default:
        informational: true

comment:
  layout: "reach, diff, flags, files"
  require_changes: true

# Exclude non-library code from coverage.
ignore:
  - "examples/**"
  - "test/e2e/**"
  - "migrations/**"
