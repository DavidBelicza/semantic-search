name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v5

      - name: Install sqlite headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  build-test-windows:
    name: Build & Test (windows-latest)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v5

      # The sqlite-vec bindings #include "sqlite3.h", which Windows has no system
      # copy of. MSYS2 provides both the gcc cgo needs and the sqlite3 headers.
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-sqlite3

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  postgres-e2e:
    name: Test & Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: semanticsearch
          POSTGRES_PASSWORD: semanticsearch
          POSTGRES_DB: semanticsearch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U semanticsearch"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CGO_ENABLED: "1"
      SEMANTIC_SEARCH_POSTGRES_DSN: postgres://semanticsearch:semanticsearch@localhost:5432/semanticsearch?sslmode=disable
    steps:
      - uses: actions/checkout@v5

      - name: Install sqlite headers
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # The Postgres DSN is set for this job, so the whole suite runs (including the Postgres and
      # pgvector stores), giving a complete coverage profile.
      - name: Test with coverage
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v5

      - name: Install sqlite headers
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # Build golangci-lint (v2, matching .golangci.yml) with this job's Go toolchain, so its
      # build Go version is not older than the module's go directive.
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Lint
        run: $(go env GOPATH)/bin/golangci-lint run ./...
